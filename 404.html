<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found — Orlanda's Multimedia Portfolio. Return to the homepage to explore projects.">
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <title>404 — Page Not Found | Orlanda's Multimedia Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ---- 404 Page Styles ---- */
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 200px);
            text-align: center;
            padding: 2rem 1.5rem;
        }

        .error-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 3.5rem 2.5rem 3rem;
            max-width: 580px;
            width: 100%;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        /* Floating orbit rings decoration */
        .orbit-decoration {
            position: absolute;
            border: 1.5px solid var(--accent-lighter);
            border-radius: 50%;
            opacity: 0.18;
            pointer-events: none;
        }

        .orbit-decoration.orbit-1 {
            width: 300px;
            height: 300px;
            top: -120px;
            right: -100px;
            animation: orbitSpin 20s linear infinite;
        }

        .orbit-decoration.orbit-2 {
            width: 200px;
            height: 200px;
            bottom: -80px;
            left: -60px;
            animation: orbitSpin 15s linear infinite reverse;
        }

        .orbit-decoration.orbit-3 {
            width: 140px;
            height: 140px;
            top: 40%;
            left: -50px;
            animation: orbitSpin 25s linear infinite;
            border-color: rgba(217, 70, 239, 0.15);
        }

        @keyframes orbitSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Floating planet dot on orbit */
        .orbit-decoration::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.5);
        }

        /* Giant 404 number */
        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(5rem, 15vw, 9rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 2;
            color: transparent;
            background: linear-gradient(135deg, var(--accent), var(--accent-light), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.15); }
            100% { filter: brightness(1); }
        }

        /* Astronaut icon */
        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(3deg); }
            75% { transform: translateY(4px) rotate(-2deg); }
        }

        .error-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.75rem;
            position: relative;
            z-index: 2;
        }

        .error-description {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto 2rem;
            position: relative;
            z-index: 2;
        }

        /* Countdown redirect bar */
        .redirect-notice {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 1.25rem;
            border-radius: var(--radius-full);
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--bg);
            border: 1px solid var(--border);
            margin-bottom: 1.75rem;
            position: relative;
            z-index: 2;
        }

        .redirect-notice i {
            color: var(--accent);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .countdown-num {
            font-weight: 700;
            color: var(--accent);
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Progress bar */
        .redirect-progress {
            width: 100%;
            max-width: 280px;
            height: 3px;
            background: var(--border);
            border-radius: var(--radius-full);
            margin: 0 auto 2rem;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }

        .redirect-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: var(--radius-full);
            width: 0%;
            transition: width 1s linear;
        }

        /* Navigation links */
        .error-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .error-nav-link {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius-md);
            font-size: 0.88rem;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition-smooth);
            color: var(--text-secondary);
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .error-nav-link:hover {
            color: var(--text);
            border-color: var(--accent-lighter);
            background: var(--accent-faint);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .error-nav-link.primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(139, 92, 246, 0.25);
        }

        .error-nav-link.primary:hover {
            background: var(--accent-dark);
            border-color: var(--accent-dark);
            box-shadow: 0 4px 16px rgba(139, 92, 246, 0.35);
        }

        /* Particle stars in the background */
        .star-field {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent-lighter);
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) var(--delay) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 0.6; transform: scale(1); }
        }

        @media (max-width: 480px) {
            .error-card {
                padding: 2.5rem 1.5rem 2rem;
            }
            .error-nav {
                flex-direction: column;
                align-items: stretch;
            }
            .error-nav-link {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Decorative star field -->
    <div class="star-field" id="starField"></div>

    <!-- Navbar -->
    <nav class="nav-glass" id="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <i class="fas fa-film"></i>
                <span>Orlanda's Multimedia Portfolio</span>
            </a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="rotoscoping.html">Rotoscoping</a>
                <a href="solar-system.html">Solar System</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </nav>

    <!-- 404 Content -->
    <main class="error-page">
        <div class="error-card">
            <!-- Orbit decorations -->
            <div class="orbit-decoration orbit-1"></div>
            <div class="orbit-decoration orbit-2"></div>
            <div class="orbit-decoration orbit-3"></div>

            <!-- Floating icon -->
            <div class="error-icon">🚀</div>

            <!-- 404 Code -->
            <div class="error-code">404</div>

            <!-- Message -->
            <h1 class="error-title">Lost in Space</h1>
            <p class="error-description">
                The page you're looking for has drifted beyond our solar system. 
                Let's navigate you back to familiar orbit.
            </p>

            <!-- Auto-redirect countdown -->
            <div class="redirect-notice">
                <i class="fas fa-circle"></i>
                Redirecting to Home in <span class="countdown-num" id="countdown">10</span>s
            </div>

            <!-- Progress bar -->
            <div class="redirect-progress">
                <div class="redirect-progress-bar" id="progressBar"></div>
            </div>

            <!-- Quick navigation links -->
            <div class="error-nav">
                <a href="index.html" class="error-nav-link primary">
                    <i class="fas fa-home"></i> Home
                </a>
                <a href="rotoscoping.html" class="error-nav-link">
                    <i class="fas fa-film"></i> Rotoscoping
                </a>
                <a href="solar-system.html" class="error-nav-link">
                    <i class="fas fa-rocket"></i> Solar System
                </a>
                <a href="contact.html" class="error-nav-link">
                    <i class="fas fa-envelope"></i> Contact
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer-glass" style="margin-top: 0;">
        <div class="footer-inner">
            <p>&copy; <span id="current-year"></span> Orlanda, Ardee Jhade B.</p>
            <div class="footer-socials">
                <a href="https://github.com/AkiraJade" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="mailto:jhadeorlanda117@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </footer>

    <script>
        // Set current year
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Mobile nav toggle
        const navToggle = document.getElementById('navToggle');
        const navLinks = document.getElementById('navLinks');
        navToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });

        // Generate twinkling stars
        (function generateStars() {
            const field = document.getElementById('starField');
            const count = 40;
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                star.style.setProperty('--delay', (Math.random() * 5) + 's');
                if (Math.random() > 0.7) {
                    star.style.width = '4px';
                    star.style.height = '4px';
                }
                field.appendChild(star);
            }
        })();

        // Countdown & redirect
        (function startCountdown() {
            let seconds = 10;
            const countdownEl = document.getElementById('countdown');
            const progressBar = document.getElementById('progressBar');
            const totalSeconds = seconds;

            // Initial progress
            progressBar.style.width = '0%';

            const interval = setInterval(() => {
                seconds--;
                countdownEl.textContent = seconds;
                progressBar.style.width = ((totalSeconds - seconds) / totalSeconds * 100) + '%';

                if (seconds <= 0) {
                    clearInterval(interval);
                    window.location.href = 'index.html';
                }
            }, 1000);
        })();
    </script>
</body>
</html>
